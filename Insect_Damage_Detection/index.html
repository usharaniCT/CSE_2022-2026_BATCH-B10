<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Insect Damage Detection</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-image: url("./assests/background2.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.65);
}

.container {
    position: relative;
    background: rgba(255, 255, 255, 0.95);
    width: 420px;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
    z-index: 2;
}

h1 {
    color: #2a5298;
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
}

input[type="file"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #2a5298;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    background: #1e3c72;
}

.result-box {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    background: #f4f6fb;
    border-left: 5px solid #2a5298;
    display: none;
}

.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <h1>Insect Damage Detection</h1>
    <p>Upload a household surface image to detect insect damage stage.</p>

    <input type="file">

    <button onclick="showResult()">Detect Damage</button>

    <div class="result-box" id="resultBox">
        <strong>Stage 2 - Moderate Damage</strong>
        <p>Suggestion: Use anti-termite spray and monitor regularly.</p>
    </div>

    <div class="footer">
        AI-Based Smart Monitoring System
    </div>
</div>

<script>
function showResult() {
    document.getElementById("resultBox").style.display = "block";
}
</script>

</body>
</html>
