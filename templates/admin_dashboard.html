<!DOCTYPE html>

<html>
<head>
<title>Admin Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.container{
display:flex;
}

/* Sidebar */


.sidebar{
width:230px;
height:100vh;
background:#2c3e50;
color:white;
padding-top:20px;
position:fixed;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#34495e;
}

/* Main Content */

.main{
margin-left:230px;
padding:30px;
width:100%;
}

.header{
margin-bottom:30px;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3{
margin-bottom:10px;
}

.card p{
font-size:26px;
font-weight:bold;
}

/* Chart Section */

.chart-box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<!-- Sidebar -->

<div class="sidebar">

<h2>Admin Panel</h2>

<a href="/admin">Dashboard</a> <a href="/users">Users</a> <a href="/predictions">Predictions</a> <a href="/logout">Logout</a>

</div>

<!-- Main Content -->

<div class="main">

<div class="header">
<h1>Dashboard</h1>
</div>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<p>{{users}}</p>
</div>

<div class="card">
<h3>Total Predictions</h3>
<p>{{scans}}</p>
</div>

<div class="card">
<h3>System Status</h3>
<p>Active</p>
</div>

</div>

<div class="chart-box">

<h3>Prediction Statistics</h3>

<canvas id="chart"></canvas>

</div>

</div>

</div>

<script>

const ctx = document.getElementById('chart');

new Chart(ctx,{
type:'bar',

data:{
labels:["Normal","Moderate","Severe"],
datasets:[{
label:"Predictions",
data:[5,3,2],
borderWidth:1
}]
},

options:{
responsive:true
}

});

</script>

</body>
</html>
