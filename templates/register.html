<!DOCTYPE html>
<html>
<head>

<title>AI-Based Insect Damage Detection System</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("/static/images/background3.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* dark overlay improves text visibility */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* Main project title */

.project-title{

position:absolute;
top:30px;

text-align:center;
color:white;

font-size:32px;
font-weight:bold;

text-shadow:2px 2px 6px black;

}


/* Card */

.card{

position:relative;
background:white;

padding:35px;

border-radius:10px;

width:400px;

box-shadow:0 10px 30px rgba(0,0,0,0.4);

text-align:center;

}

.card h2{
margin-bottom:20px;
color:#2e7d32;
}

input{

width:100%;
padding:12px;
margin:8px 0;

border-radius:6px;
border:1px solid #ccc;

}

button{

width:100%;
padding:12px;
margin-top:10px;

border:none;
border-radius:6px;

cursor:pointer;

background:#2e7d32;
color:white;

}

button:hover{
background:#1b5e20;
}

.login-btn{
background:#1976d2;
}

.admin-btn{
background:#c0392b;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="project-title">
 Insect Damage Detection in Household Surfaces Using AI Based Image Processing
</div>

<div class="card">

<h2>User Registration</h2>

<form action="/register" method="POST">

<input type="text" name="name" placeholder="Full Name" required>

<input type="text" name="phone" placeholder="Phone Number" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="password" name="password" placeholder="Password" required>

<input type="password" name="confirm_password" placeholder="Re-enter Password" required>

<button type="submit">Register</button>

</form>

<form action="/login_page">
<button class="login-btn">User Login</button>
</form>

<form action="/admin_login_page">
<button class="admin-btn">Admin Login</button>
</form>

</div>

</body>
</html>
