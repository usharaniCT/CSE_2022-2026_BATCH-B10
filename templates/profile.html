<!doctype html>
<html>
  <head>
    <title>User Profile</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: url("/static/images/background3.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        width: 420px;
        margin: auto;
        margin-top: 80px;
        background: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      .profile-icon {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: #4facfe;
        color: white;
        font-size: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: auto;
        margin-bottom: 15px;
      }

      h2 {
        margin-bottom: 25px;
        color: #333;
      }

      .info {
        text-align: left;
        margin-top: 20px;
      }

      .info p {
        font-size: 16px;
        margin: 12px 0;
        padding: 10px;
        background: #f7f7f7;
        border-radius: 6px;
      }

      .label {
        font-weight: bold;
        color: #444;
      }

      .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 18px;
        background: #4facfe;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        transition: 0.3s;
      }

      .btn:hover {
        background: #2f80ed;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="profile-icon">👤</div>

      <h2>User Profile</h2>

      <div class="info">
        <p><span class="label">Name :</span> {{name}}</p>

        <p><span class="label">Phone :</span> {{phone}}</p>

        <p><span class="label">Email :</span> {{email}}</p>
      </div>

      <a href="/dashboard" class="btn">Back to Dashboard</a>
    </div>
  </body>
</html>
