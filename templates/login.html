<!DOCTYPE html>

<html>
<head>
<title>User Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("/static/images/background3.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* dark overlay improves text visibility */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

.card{

width:350px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;

}

.card h2{
margin-bottom:25px;
}

input{

width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;

}

button{

width:100%;
padding:12px;
margin-top:10px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;

}

button:hover{
background:#1b5e20;
}

.register-btn{

background:#1976d2;
margin-top:15px;

}

.register-btn:hover{
background:#0d47a1;
}

.text{
margin-top:15px;
font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<h2>User Login</h2>

<form action="/login" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="text">
Don't have an account?
</div>

<a href="/">
<button class="register-btn">Register</button>
</a>

</div>

</body>
</html>
