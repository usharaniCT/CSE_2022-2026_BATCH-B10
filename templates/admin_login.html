<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("/static/images/background3.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.card{

position:relative;
background:white;
padding:35px;
border-radius:10px;
width:350px;

box-shadow:0 8px 25px rgba(0,0,0,0.4);

text-align:center;

}

.card h2{
margin-bottom:20px;
color:#c0392b;
}

input{

width:100%;
padding:12px;
margin:10px 0;

border-radius:5px;
border:1px solid #ccc;

}

button{

width:100%;
padding:12px;

background:#c0392b;
color:white;

border:none;
border-radius:5px;

cursor:pointer;

}

button:hover{
background:#922b21;
}

.back{

margin-top:10px;
background:#3498db;

}

.back:hover{
background:#21618c;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<h2>Admin Login</h2>

<form action="/admin_login" method="POST">

<input type="email" name="email" placeholder="Admin Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<form action="/">

<button class="back">Back to User Login</button>

</form>

</div>

</body>
</html>
