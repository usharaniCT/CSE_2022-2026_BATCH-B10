<!DOCTYPE html>
<html>
<head>
<title>Detection History</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("/static/images/background3.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    margin-top:50px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#4facfe;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f2f6ff;
}

img{
    width:120px;
    border-radius:6px;
    box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:10px 18px;
    background:#4facfe;
    color:white;
    text-decoration:none;
    border-radius:6px;
    transition:0.3s;
}

.btn:hover{
    background:#2f80ed;
}

.button-area{
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Detection History</h2>

<table>

<tr>
<th>Uploaded Image</th>
<th>Prediction Result</th>
</tr>

{% for row in data %}

<tr>

<td>
<img src="/static/uploads/{{row[0]}}">
</td>

<td>{{row[1]}}</td>

</tr>

{% endfor %}

</table>

<div class="button-area">
<a href="/dashboard" class="btn">Back to Dashboard</a>
</div>

</div>

</body>
</html>
